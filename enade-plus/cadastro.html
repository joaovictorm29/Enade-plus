<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENADE+ — Criar conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Ajuste específico desta tela: título um pouco menor
       pois o formulário tem mais campos e precisamos de espaço */
    .form-title { font-size: 28px; }
  </style>
</head>
<body>

  <div class="auth-layout">

    <div class="panel-left">
      <div class="brand-logo">e</div>
      <div class="brand-name">ENADE</div>
      <div class="brand-tagline-label">PLUS</div>
      <div class="brand-divider"></div>
      <p class="brand-slogan">
        Crie sua conta e comece sua jornada de preparação para o ENADE hoje mesmo.
      </p>
    </div>


    <div class="panel-right">
      <div class="form-container">

        <a href="index.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Voltar ao login
        </a>

        <h1 class="form-title">Criar conta</h1>
        <p class="form-subtitle">Preencha seus dados para começar</p>

        <form id="register-form" action="#" novalidate>

          <div class="form-group">
            <label for="name">Nome Completo</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Seu nome completo"
                autocomplete="name"
              />
            </div>
          </div>


          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-wrapper">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                autocomplete="email"
              />
            </div>
          </div>


          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                class="has-icon"
                autocomplete="new-password"
              />
              <button type="button" class="toggle-password" data-target="password" aria-label="Mostrar senha">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>


          <div class="form-group">
            <label for="confirm-password">Confirmar Senha</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="••••••••"
                class="has-icon"
                autocomplete="new-password"
              />
              <button type="button" class="toggle-password" data-target="confirm-password" aria-label="Mostrar senha">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-primary" style="margin-top: 8px;">Criar conta</button>

          <div class="divider">ou</div>

          <p class="auth-link">
            Já tem uma conta? <a href="index.html">Entrar</a>
          </p>

        </form>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
